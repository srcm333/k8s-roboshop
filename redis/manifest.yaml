apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # labels related to deployment resource
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # Pod
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  selector:
    project: roboshop
    tier: db
    component: redis
  ports:
    - protocol: TCP
      port: 6379 # service port
      targetPort: 6379 # container port